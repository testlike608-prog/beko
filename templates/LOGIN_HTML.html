<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        function redirectBlocked() {
          window.location.href = "/blocked";
        }

        function initDevToolsProtection() {
          console.log("🛡️ DevTools protection active");

          // منع كليك يمين
          document.addEventListener("contextmenu", (e) => e.preventDefault());

          // منع مفاتيح معينة
          document.addEventListener("keydown", (e) => {
            if (
              e.key === "F12" ||
              (e.ctrlKey &&
                e.shiftKey &&
                (e.key.toUpperCase() === "I" || e.key.toUpperCase() === "J")) ||
              (e.ctrlKey && e.key.toUpperCase() === "U")
            ) {
              e.preventDefault();
              e.stopPropagation();
              redirectBlocked();
              return false;
            }
          });

          // كشف DevTools بطريقة الحجم
          setInterval(() => {
            const widthDiff = window.outerWidth - window.innerWidth;
            const heightDiff = window.outerHeight - window.innerHeight;
            if (widthDiff > 160 || heightDiff > 160) {
              redirectBlocked();
            }
          }, 500);

          // كشف DevTools بطريقة console
          const check = () => {
            const start = performance.now();
            debugger; 
            if (performance.now() - start > 50) {
              redirectBlocked();
            }
          };
          setInterval(check, 1000);
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", initDevToolsProtection);
        } else {
          initDevToolsProtection();
        }
      })();
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Form</title>

    <style>
      /* تنسيقات إظهار كلمة المرور */
      .password-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      .toggle-password {
        position: absolute;
        right: 15px;
        cursor: pointer;
        font-size: 11px;
        color: #00c6ff;
        user-select: none;
        font-weight: bold;
        letter-spacing: 0.5px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(
          135deg,
          #0f2027 0%,
          #203a43 40%,
          #2c5364 100%
        );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: #e9eef3;
      }

      .login-container {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        padding: 40px;
        width: 100%;
        max-width: 400px;
        text-align: center;
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .login-container::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: linear-gradient(90deg, #00c6ff, #0072ff, #00c6ff);
        animation: gradientMove 3s linear infinite;
        background-size: 200% 100%;
      }

      @keyframes gradientMove {
        0% { background-position: 0 0; }
        100% { background-position: 200% 0; }
      }

      .logo {
        width: 70px;
        height: 70px;
        margin: 0 auto 25px;
        background: linear-gradient(135deg, #00c6ff, #0072ff);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 26px;
        font-weight: bold;
        box-shadow: 0 0 15px rgba(0, 114, 255, 0.6);
      }

      h1 {
        font-size: 26px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 10px;
      }

      .subtitle {
        color: #a7b5c2;
        margin-bottom: 30px;
        font-size: 14px;
      }

      .form-group {
        margin-bottom: 25px; /* زيادة بسيطة في المسافة بعد حذف الخيار */
        text-align: left;
      }

      .form-group label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: #cfd9e3;
        margin-bottom: 8px;
      }

      .form-group input {
        width: 100%;
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        font-size: 15px;
        transition: all 0.3s ease;
        background: rgba(255, 255, 255, 0.08);
        color: #f1f1f1;
        outline: none;
      }

      .form-group input:focus {
        border-color: #00c6ff;
        box-shadow: 0 0 8px rgba(0, 198, 255, 0.3);
        background: rgba(255, 255, 255, 0.15);
      }

      .login-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(90deg, #00c6ff, #0072ff);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
        box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4);
      }

      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 198, 255, 0.5);
      }

      .divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
        margin: 25px 0;
      }

      .error {
        background: rgba(255, 77, 77, 0.15);
        color: #ff8080;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 14px;
        border: 1px solid rgba(255, 77, 77, 0.3);
      }

      @media (max-width: 480px) {
        .login-container { padding: 30px 20px; }
        h1 { font-size: 22px; }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="logo">M</div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Please sign in to your account</p>
      
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form method="POST">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            required
            placeholder="Enter your username"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              required
              placeholder="Enter your password"
            />
            <span class="toggle-password" id="togglePassword">SHOW</span>
          </div>
        </div>

        <button type="submit" class="login-btn">Sign In</button>
        <div class="divider"></div>
      </form>
    </div>

    <script>
      document.addEventListener("contextmenu", (event) => event.preventDefault());
      document.onkeydown = function (e) {
        if (e.keyCode == 123) return false;
        if (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) return false;
        if (e.ctrlKey && e.keyCode == 85) return false;
      };

      // سكربت إظهار وإخفاء كلمة المرور
      const passwordInput = document.querySelector('#password');
      const togglePassword = document.querySelector('#togglePassword');

      togglePassword.addEventListener('click', function () {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.textContent = type === 'password' ? 'SHOW' : 'HIDE';
      });
    </script>

    {% if csv_files %}
    <section style="margin-top: 20px; width: 100%; max-width: 800px;">
       </section>
    {% endif %}
  </body>
</html>
